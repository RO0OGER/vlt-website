name: Dependency Scan

# Findet bekannte Lücken in npm-Paketen (npm audit) und blockiert PRs,
# die neue verwundbare oder unpassend lizenzierte Abhängigkeiten einführen.
on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # jeden Montag 06:00 UTC

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      # Bricht ab bei Lücken der Stufe "high" oder "critical".
      - name: npm audit
        run: npm audit --audit-level=high

  dependency-review:
    name: Dependency Review (nur PRs)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
